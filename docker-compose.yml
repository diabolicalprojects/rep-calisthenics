version: '3.8'

services:
  # Base de Datos (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: gym_db
    restart: always
    environment:
      POSTGRES_USER: gym_user
      POSTGRES_PASSWORD: gym_password_secure
      POSTGRES_DB: gym_management
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # El Motor (Backend API)
  backend:
    build: ./backend
    container_name: gym_backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://gym_user:gym_password_secure@db:5432/gym_management
      PORT: 4000
      JWT_SECRET: super_secret_key_change_me
    depends_on:
      - db

  # La Interfaz (Frontend)
  frontend:
    build: ./frontend
    container_name: gym_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
